name: Build and package

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      mod_version:
        description: "打包版本号，例如 0.1.1；留空则使用 modinfo.json 中的版本"
        required: false
        type: string

env:
  DOTNET_VERSION: 10.0.x
  VINTAGE_STORY_VERSION: 1.22.2
  VINTAGE_STORY_DOWNLOAD_URL: ${{ vars.VINTAGE_STORY_DOWNLOAD_URL }}

jobs:
  build:
    name: Build mod zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Resolve mod version
        id: version
        shell: bash
        env:
          REQUESTED_MOD_VERSION: ${{ github.event.inputs.mod_version }}
        run: |
          set -euo pipefail

          source_version="$(sed -nE 's/.*"version"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/p' modinfo.json | head -n 1)"
          mod_version="${REQUESTED_MOD_VERSION:-$source_version}"

          if [ -z "$mod_version" ]; then
            echo "Could not resolve mod version from workflow input or modinfo.json." >&2
            exit 1
          fi

          if ! [[ "$mod_version" =~ ^[0-9A-Za-z][0-9A-Za-z._+-]*$ ]]; then
            echo "Invalid mod version: $mod_version" >&2
            echo "Use letters, numbers, dot, underscore, plus, or minus only." >&2
            exit 1
          fi

          echo "MOD_VERSION=$mod_version" >> "$GITHUB_ENV"
          echo "SOURCE_MOD_VERSION=$source_version" >> "$GITHUB_ENV"
          echo "mod_version=$mod_version" >> "$GITHUB_OUTPUT"
          echo "source_mod_version=$source_version" >> "$GITHUB_OUTPUT"
          echo "Using mod version: $mod_version"

      - name: Download Vintage Story assemblies
        shell: bash
        run: |
          set -euo pipefail

          vs_url="${VINTAGE_STORY_DOWNLOAD_URL:-https://cdn.vintagestory.at/gamefiles/stable/vs_client_linux-x64_${VINTAGE_STORY_VERSION}.tar.gz}"
          mkdir -p .vintagestory artifacts

          curl --fail --location --retry 3 --retry-delay 5 "$vs_url" --output artifacts/vintagestory.tar.gz
          tar -xzf artifacts/vintagestory.tar.gz -C .vintagestory

          api_dll="$(find .vintagestory -type f -name VintagestoryAPI.dll | head -n 1)"
          if [ -z "$api_dll" ]; then
            echo "Could not find VintagestoryAPI.dll after extraction." >&2
            find .vintagestory -maxdepth 5 -type f | sort >&2
            exit 1
          fi

          vintage_story_path="$(cd "$(dirname "$api_dll")" && pwd)"
          echo "VINTAGE_STORY=$vintage_story_path" >> "$GITHUB_ENV"

      - name: Build Release
        run: dotnet build SimpleVoiceChat.csproj -c Release

      - name: Package mod
        shell: bash
        run: |
          set -euo pipefail

          package_dir="$GITHUB_WORKSPACE/bin/Release/Mods/mod"
          zip_path="$GITHUB_WORKSPACE/artifacts/SimpleVoiceChat-v${MOD_VERSION}.zip"

          test -f "$package_dir/modinfo.json"
          test -f "$package_dir/SimpleVoiceChat.dll"
          test -f "$package_dir/README.md"
          test -f "$package_dir/assets/simplevoicechat/textures/gui/haojiao.png"
          test -f "$package_dir/assets/simplevoicechat/textures/gui/nohaojiao.png"

          if [ "$MOD_VERSION" != "$SOURCE_MOD_VERSION" ]; then
            sed -i -E "s/\"version\"[[:space:]]*:[[:space:]]*\"[^\"]+\"/\"version\": \"${MOD_VERSION}\"/" "$package_dir/modinfo.json"
          fi

          rm -f "$zip_path"
          (
            cd "$package_dir"
            zip -r "$zip_path" .
          )

          unzip -l "$zip_path"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleVoiceChat-v${{ steps.version.outputs.mod_version }}
          path: artifacts/SimpleVoiceChat-v${{ steps.version.outputs.mod_version }}.zip
          if-no-files-found: error
